name: luckypicky
description: "LuckyPicky — 선행으로 채우는 네잎클로버"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.10.3
  google_mobile_ads: ^5.3.1
  app_tracking_transparency: ^2.0.6
  gal: ^2.3.2
  share_plus: ^13.1.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3

# 네이티브 스플래시 — 앱 실행 ~ Flutter 엔진 부팅 구간을 덮는다.
# 이미지는 test/export_brand_assets_test.dart 가 클로버 경로에서 생성한다.
# 재생성: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/brand/clover_splash.png
  android_12:
    image: assets/brand/clover_android12.png
    icon_background_color: "#FFFFFF"
  web: true

# 앱 아이콘 — 재생성: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/brand/app_icon.png
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/brand/app_icon_foreground.png
  web:
    generate: true
    background_color: "#FFFFFF"
    theme_color: "#6FC143"

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
    - family: TossFace
      fonts:
        - asset: assets/fonts/TossFace.otf
    # 로고 워드마크용 둥근 팝 계열 (가변 폰트, OFL — 라이선스 전문 동봉).
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka.ttf
    - family: Baloo2
      fonts:
        - asset: assets/fonts/Baloo2.ttf
